name: Amazon MemoryDB
description: >-
  Amazon MemoryDB is a durable, in-memory database service that delivers ultra-fast
  performance. It is purpose-built for modern applications with microservices architectures.
  MemoryDB is compatible with Redis and Memcached, giving you the flexibility to use
  the same popular and open source data structures, APIs, and commands that they already
  use today.
