created: '2024-01-15'
modified: '2026-03-16'

apis:
  - name: Amazon MemoryDB API
    description: >-
      The Amazon MemoryDB API provides programmatic access to create and manage
      MemoryDB clusters, parameter groups, subnet groups, snapshots, users,
      and ACLs for Redis-compatible in-memory databases.
